<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <rect width="64" height="64" rx="16" fill="#08070A"/>
  <!-- Cat head circle -->
  <circle cx="32" cy="36" r="18" fill="#F97316"/>
  <!-- Left ear -->
  <polygon points="14,22 20,10 26,24" fill="#F97316"/>
  <!-- Right ear -->
  <polygon points="38,24 44,10 50,22" fill="#F97316"/>
  <!-- Left ear inner -->
  <polygon points="16,21 20,12 24,22" fill="#FBBF24"/>
  <!-- Right ear inner -->
  <polygon points="40,22 44,12 48,21" fill="#FBBF24"/>
  <!-- Left eye -->
  <ellipse cx="25" cy="34" rx="3.5" ry="4" fill="#08070A"/>
  <circle cx="26" cy="33" r="1.2" fill="white"/>
  <!-- Right eye -->
  <ellipse cx="39" cy="34" rx="3.5" ry="4" fill="#08070A"/>
  <circle cx="40" cy="33" r="1.2" fill="white"/>
  <!-- Nose -->
  <polygon points="32,39 30,42 34,42" fill="#08070A"/>
  <!-- Left whiskers -->
  <line x1="14" y1="41" x2="27" y2="43" stroke="#08070A" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="14" y1="45" x2="27" y2="45" stroke="#08070A" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Right whiskers -->
  <line x1="37" y1="43" x2="50" y2="41" stroke="#08070A" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="37" y1="45" x2="50" y2="45" stroke="#08070A" stroke-width="1.5" stroke-linecap="round"/>
</svg>
